<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV Rewari AI Study Material</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .heading {
            font-size: 3.5rem;
            font-weight: bold;
            color: #001a4d;
            text-shadow: 0 0 10px #0033ff, 0 0 20px #0033ff, 0 0 30px #0033ff;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
        }

        .attribution-box {
            background-color: #FFB3A1;
            padding: 30px 40px;
            border-radius: 10px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(255, 179, 161, 0.3);
        }

        .attribution-box p {
            font-size: 1.1rem;
            color: #333333;
            line-height: 1.8;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .heading {
                font-size: 2.5rem;
            }

            .attribution-box {
                padding: 20px 30px;
                max-width: 90%;
            }

            .attribution-box p {
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .heading {
                font-size: 1.8rem;
            }

            .attribution-box {
                padding: 15px 20px;
            }

            .attribution-box p {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <h1 class="heading">KV REWARI AI STUDY MATERIAL</h1>
    
    <div class="attribution-box">
        <p>Completed with the hardwork of the students of KVS Rewari under the guidance of respected Neelima mam.<br>
        Web developed by Aanya Singh, Class 10</p>
    </div>
</body>
</html>
